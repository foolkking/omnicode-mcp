version: "3.9"

services:
  omnicode:
    build: .
    ports:
      - "6789:6789"
    volumes:
      # Mount your project as the working directory
      - ./:/workspace
      # Persist index + memory across container restarts
      - omnicode-data:/workspace/.data
    environment:
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
      - WORKING_DIR=/workspace
      # Optional: pass API keys via env
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6789/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  omnicode-data:
    driver: local
