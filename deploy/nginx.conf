# =============================================================================
# OmniCode-MCP — sample nginx reverse-proxy config (Wave 2, W2-3).
#
# Place this in /etc/nginx/sites-available/omnicode then symlink it into
# /etc/nginx/sites-enabled/. Provision the TLS cert with certbot:
#
#   sudo certbot --nginx -d omnicode.example.com
#
# Then run the app on a private interface so nginx is the only public
# entry point:
#
#   omnicode serve --headless --mode cloud --host 127.0.0.1 --port 6789
#
# Or via systemd — see ``deploy/omnicode.service``.
# =============================================================================

upstream omnicode_backend {
    server 127.0.0.1:6789 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# Optional second upstream for the MCP-over-HTTP transport.
# Comment out the whole block if you don't expose MCP over the wire.
upstream omnicode_mcp {
    server 127.0.0.1:6790 fail_timeout=5s max_fails=3;
    keepalive 8;
}

# Force HTTP -> HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name omnicode.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name omnicode.example.com;

    # Filled in by certbot — do NOT commit real cert paths if you
    # publish this file.
    ssl_certificate     /etc/letsencrypt/live/omnicode.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnicode.example.com/privkey.pem;

    # Reasonable TLS hardening defaults. Adjust to your TLS policy.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Forward headers so FastAPI sees the real client + scheme.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Request-body size: edit operations send full file contents.
    client_max_body_size 25m;

    # Standard REST + Web Console.
    location / {
        proxy_pass http://omnicode_backend;
        proxy_read_timeout 60s;
    }

    # WebSocket — used by the Web Console for live logs.
    location /ws/logs {
        proxy_pass http://omnicode_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # MCP over Server-Sent Events. SSE needs a long timeout and
    # explicit cache disable.
    location /mcp/ {
        proxy_pass http://omnicode_mcp/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";          # SSE: keep alive
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        chunked_transfer_encoding on;
    }

    # Block /admin from the public internet by default; uncomment the
    # ``allow`` line and replace with your office / VPN CIDR.
    location /admin/ {
        # allow 203.0.113.0/24;
        # deny all;
        proxy_pass http://omnicode_backend;
        proxy_read_timeout 60s;
    }
}
