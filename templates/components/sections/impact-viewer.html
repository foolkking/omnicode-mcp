<!--
  Impact Viewer (Wave 2, W2-6).

  Front-end for the /graph/impact, /graph/risk, /graph/related-tests
  endpoints. Type a symbol → see blast radius, callers, callees,
  related tests, risk rating.
-->
<div class="space-y-4">
    <div class="bg-white shadow-lg rounded-lg overflow-hidden">
        <div class="px-6 py-4 bg-gradient-to-r from-rose-50 to-orange-50 border-b border-gray-200">
            <h2 class="text-2xl font-bold flex items-center text-gray-900">
                <i class="fas fa-bullseye mr-3 text-rose-500"></i>
                Impact Viewer
            </h2>
            <p class="text-sm text-gray-600 mt-1">
                Estimate the blast radius of changing a symbol — callers, callees,
                files involved, suggested tests, and a low/medium/high risk rating.
            </p>
        </div>

        <div class="p-6 space-y-4">
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="ivSymbol" type="text" placeholder="symbol name (e.g. ProviderRegistry.upsert)"
                       class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono">
                <select id="ivDepth" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                    <option value="1">depth 1</option>
                    <option value="2" selected>depth 2</option>
                    <option value="3">depth 3</option>
                    <option value="4">depth 4</option>
                </select>
                <button onclick="ivAnalyze()" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-md text-sm font-medium">
                    <i class="fas fa-search mr-1"></i> Analyze
                </button>
            </div>

            <div id="ivSummary" class="hidden grid grid-cols-2 lg:grid-cols-5 gap-3"></div>

            <div id="ivDetails" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-4"></div>

            <div id="ivEmpty" class="text-center py-12 text-gray-400 text-sm">
                <i class="fas fa-search text-3xl mb-3"></i>
                <div>Enter a symbol above to compute its impact radius.</div>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    function _escape(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function _stat(label, value, colour) {
        const c = colour || 'gray';
        return `<div class="bg-${c}-50 border border-${c}-200 rounded-md p-3">
            <div class="text-xs uppercase tracking-wide text-${c}-700 font-semibold">${label}</div>
            <div class="text-2xl font-bold text-${c}-900 mt-1">${_escape(value)}</div>
        </div>`;
    }

    function _list(label, items, emptyMessage) {
        const arr = Array.isArray(items) ? items : [];
        if (arr.length === 0) {
            return `<div class="bg-gray-50 border border-gray-200 rounded-md p-4">
                <div class="text-xs uppercase font-semibold text-gray-700">${label}</div>
                <div class="text-xs text-gray-400 mt-1">${_escape(emptyMessage)}</div>
            </div>`;
        }
        const rows = arr.slice(0, 25).map((s) =>
            `<li class="font-mono text-xs text-gray-700 py-0.5 truncate">${_escape(s)}</li>`
        );
        return `<div class="bg-gray-50 border border-gray-200 rounded-md p-4">
            <div class="text-xs uppercase font-semibold text-gray-700 flex items-center justify-between">
                <span>${label}</span>
                <span class="text-gray-400">${arr.length}</span>
            </div>
            <ul class="mt-2 space-y-0.5">${rows.join('')}</ul>
            ${arr.length > 25 ? `<div class="text-xs text-gray-400 mt-2">…and ${arr.length - 25} more</div>` : ''}
        </div>`;
    }

    function _riskBadge(level) {
        if (!level) return '';
        const map = {
            high: 'bg-red-100 text-red-800',
            medium: 'bg-amber-100 text-amber-800',
            low: 'bg-emerald-100 text-emerald-800',
        };
        const cls = map[level] || 'bg-gray-100 text-gray-700';
        return `<span class="px-2 py-0.5 rounded text-xs font-semibold uppercase ${cls}">${level}</span>`;
    }

    async function ivAnalyze() {
        const symbol = document.getElementById('ivSymbol').value.trim();
        if (!symbol) {
            window.notifications?.warning('Enter a symbol to analyze.');
            return;
        }
        const depth = parseInt(document.getElementById('ivDepth').value, 10) || 2;
        document.getElementById('ivEmpty').classList.add('hidden');

        const summaryEl = document.getElementById('ivSummary');
        const detailsEl = document.getElementById('ivDetails');
        summaryEl.classList.remove('hidden');
        detailsEl.classList.remove('hidden');
        summaryEl.innerHTML = '<div class="col-span-full text-center text-gray-500 py-3"><i class="fas fa-spinner fa-spin mr-2"></i>Computing impact…</div>';
        detailsEl.innerHTML = '';

        // Fire all three calls in parallel.
        const [impactRes, riskRes, testsRes] = await Promise.all([
            window.apiRoutes.graph.impact(symbol, depth),
            window.apiRoutes.graph.risk(symbol),
            window.apiRoutes.graph.relatedTests(symbol),
        ]);

        if (!impactRes.success) {
            summaryEl.innerHTML = `<div class="col-span-full text-red-600 text-sm">${_escape(impactRes.error || 'impact call failed')}</div>`;
            return;
        }

        const impact = impactRes.data?.result || {};
        const risk = riskRes.success ? (riskRes.data?.result || {}) : {};
        const tests = testsRes.success ? (testsRes.data?.result || {}) : {};

        const riskLevel = risk.risk_level || risk.level || '';
        summaryEl.innerHTML = [
            _stat('Blast radius', impact.total_blast_radius ?? '—', 'rose'),
            _stat('Affected', impact.affected_count ?? '—', 'orange'),
            _stat('Dependents', impact.dependent_count ?? '—', 'amber'),
            _stat('Files', impact.files_count ?? '—', 'sky'),
            `<div class="bg-white border border-gray-200 rounded-md p-3">
                <div class="text-xs uppercase tracking-wide text-gray-500 font-semibold">Risk</div>
                <div class="text-lg font-bold mt-1 flex items-center gap-2">
                    ${_riskBadge(riskLevel)}
                    <span class="text-gray-400 text-sm">${_escape(risk.risk_score?.toFixed?.(2) || '')}</span>
                </div>
                ${risk.advisory ? `<div class="text-xs text-gray-600 mt-2">${_escape(risk.advisory)}</div>` : ''}
            </div>`,
        ].join('');

        detailsEl.innerHTML = [
            _list('Affected (callees)', impact.affected_symbols, 'Symbol calls nothing in scope.'),
            _list('Dependents (callers)', impact.dependent_symbols, 'No callers found in scope.'),
            _list('Files involved', impact.files_involved, 'No files match yet — try a wider depth.'),
        ].join('');

        if (tests?.test_files?.length || tests?.suggested_commands?.length) {
            const testHtml = `<div class="lg:col-span-3 bg-emerald-50 border border-emerald-200 rounded-md p-4">
                <div class="text-xs uppercase font-semibold text-emerald-800">Suggested tests</div>
                <ul class="mt-2 space-y-0.5">
                    ${(tests.test_files || []).slice(0, 15).map((t) => `<li class="font-mono text-xs text-emerald-900">${_escape(t)}</li>`).join('')}
                </ul>
                ${(tests.suggested_commands || []).length ? `
                    <div class="mt-3 text-xs uppercase font-semibold text-emerald-800">Run</div>
                    <pre class="mt-1 bg-white p-2 rounded text-xs font-mono text-gray-800 whitespace-pre-wrap">${_escape((tests.suggested_commands || []).join('\n'))}</pre>` : ''}
            </div>`;
            detailsEl.insertAdjacentHTML('beforeend', testHtml);
        }
    }

    window.ivAnalyze = ivAnalyze;

    // Allow Enter-to-analyze
    document.getElementById('ivSymbol')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') ivAnalyze();
    });
})();
</script>
